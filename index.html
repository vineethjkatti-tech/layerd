    const CustomPrintView = ({ setView }) => {
      const [loading, setLoading] = useState(false);
      const [formData, setFormData] = useState({ name: "", email: "", description: "" });
      const [confirmRights, setConfirmRights] = useState(false);
      const [confirmNoIllegal, setConfirmNoIllegal] = useState(false);
      const [file, setFile] = useState(null);
      const [error, setError] = useState("");
      const [isSuccess, setIsSuccess] = useState(false);

      // Dynamic inventory state
      const [materials, setMaterials] = useState([]);
      const [colors, setColors] = useState([]);
      const [selectedMaterial, setSelectedMaterial] = useState("");
      const [selectedColor, setSelectedColor] = useState("");
      const [fetchingColors, setFetchingColors] = useState(false);

      // Fetch materials on mount
      useEffect(() => {
        const fetchMaterials = async () => {
          try {
            const { data, error } = await supabase
              .from('materials')
              .select('*')
              .eq('is_available', true)
              .order('name');

            if (error) throw error;
            setMaterials(data || []);
          } catch (err) {
            console.error('Material sync failure:', err);
          }
        };

        fetchMaterials();
      }, []);

      // Fetch colors based on material with race condition prevention
      useEffect(() => {
        let isStale = false;
        let abortController = null;

        const fetchColors = async () => {
          // Immediately clear existing palette and selection to prevent stale data
          setColors([]);
          setSelectedColor("");

          if (!selectedMaterial) return;

          setFetchingColors(true);

          // Use AbortController for Supabase query cancellation simulation
          abortController = new AbortController();

          try {
            const { data, error } = await supabase
              .from('colors')
              .select('*')
              .eq('material_id', selectedMaterial)
              .eq('is_available', true)
              .order('name');

            // Ignore results if this effect has been superseded
            if (isStale) return;

            if (error) throw error;
            setColors(data || []);
          } catch (err) {
            if (!isStale) {
              console.error('Color sync failure:', err);
            }
          } finally {
            if (!isStale) {
              setFetchingColors(false);
            }
          }
        };

        fetchColors();

        // Cleanup: mark as stale and abort any pending operations
        return () => {
          isStale = true;
          if (abortController) {
            abortController.abort();
          }
        };
      }, [selectedMaterial]);

      const validateEmail = (email) => {
        return String(email)
          .toLowerCase()
          .match(
            /^(([^<>()[\]\\.,;:\s@"]+(\.[^<>()[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/
          );
      };

      const handleFileChange = (e) => {
        const selectedFile = e.target.files[0];
        setError("");

        if (!selectedFile) return;

        const ext = selectedFile.name.split('.').pop().toLowerCase();
        const allowedExts = ['stl', 'obj', '3mf', 'zip'];

        if (!allowedExts.includes(ext)) {
          setError("Only STL, OBJ, 3MF, and ZIP files are allowed.");
          e.target.value = null;
          setFile(null);
          return;
        }

        if (selectedFile.size > 20 * 1024 * 1024) {
          setError("File must be under 20MB.");
          e.target.value = null;
          setFile(null);
          return;
        }

        setFile(selectedFile);
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError("");

        if (!formData.name || !formData.email || !formData.description || !file || !selectedMaterial || !selectedColor || !confirmRights || !confirmNoIllegal) {
          setError("Incomplete Data: Please fill all fields, confirm rights, and upload your geometry.");
          return;
        }

        if (!validateEmail(formData.email)) {
          setError("Invalid Route: Please enter a valid email address.");
          return;
        }

        // Note: Rate limiting is enforced server-side by the Edge Function
        setLoading(true);

        try {
          // SECURITY: Sanitize all inputs
          const sanitizedName = sanitizeText(formData.name, 255);
          const sanitizedEmail = sanitizeEmail(formData.email);
          const sanitizedDescription = sanitizeText(formData.description, 2000);
          const sanitizedFilename = sanitizeFilename(file.name);

          // 1. Validate file server-side (Edge Function)
          const validateResponse = await fetch(EDGE_FUNCTIONS.validateFile, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': supabaseKey,
            },
            body: JSON.stringify({
              filename: sanitizedFilename,
              contentType: file.type,
              size: file.size
            })
          });

          const validateResult = await validateResponse.json();
          
          if (!validateResponse.ok || !validateResult.valid) {
            throw new Error(validateResult.error || "File validation failed");
          }

          // 2. Upload file to Supabase Storage with sanitized name
          const fileName = `${Date.now()}_${sanitizedFilename}`;
          const { data: uploadData, error: uploadError } = await supabase
            .storage
            .from('custom-uploads')
            .upload(fileName, file);

          if (uploadError) throw uploadError;

          // 3. Get public URL
          const { data: { publicUrl } } = supabase
            .storage
            .from('custom-uploads')
            .getPublicUrl(fileName);

          // 4. Insert into custom_requests table with sanitized data
          const { error: insertError } = await supabase
            .from('custom_requests')
            .insert([{
              name: sanitizedName,
              email: sanitizedEmail,
              description: sanitizedDescription,
              file_url: publicUrl,
              material_id: selectedMaterial,
              color_id: selectedColor
            }]);

          if (insertError) throw insertError;

          setIsSuccess(true);
          setFormData({ name: "", email: "", description: "" });
          setSelectedMaterial("");
          setSelectedColor("");
          setFile(null);
        } catch (err) {
          setError("Transmission Error: " + err.message);
        } finally {
          setLoading(false);
        }
      };

      if (isSuccess) {
        return (
          <div className="container mx-auto px-6 py-24 flex flex-col items-center justify-center text-center">
            <Reveal>
              <div className="w-24 h-24 rounded-full bg-brand-purple/20 flex items-center justify-center mb-8 border border-brand-purple/30 mx-auto shadow-[0_0_50px_rgba(155,135,245,0.2)]">
                <CustomIcon name="check" size={48} className="text-brand-purple" />
              </div>
              <h2 className="text-4xl font-bold mb-6">Request Transmitted.</h2>
              <p className="text-brand-gray text-lg max-w-md mx-auto mb-12">
                Your custom print parameters have been secured. Our studio will review the geometry and contact you via the provided route.
              </p>
              <button
                onClick={() => setView('home')}
                className="btn-primary px-12 py-4 rounded-xl font-bold uppercase tracking-widest text-xs"
              >
                Return to Studio
              </button>
            </Reveal>
          </div>
        );
      }

      return (
        <div className="container mx-auto px-6 py-24">
          <div className="max-w-3xl mx-auto">
            <Reveal>
              <span className="text-brand-purple text-[10px] font-bold uppercase tracking-[0.4em] mb-4 block">Bespoke Production</span>
              <h2 className="text-4xl md:text-5xl font-bold mb-8 text-white">Custom Print Protocol</h2>
              <p className="text-brand-gray text-lg mb-12 max-w-xl">
                Upload your digital geometry and specify your requirements. We review every custom request for structural integrity and aesthetic weight.
              </p>
            </Reveal>

            <Reveal delay={200}>
              <form onSubmit={handleSubmit} className="glass-card p-10 md:p-12 rounded-3xl space-y-8 relative overflow-hidden">
                <div className="absolute top-0 right-0 w-32 h-32 bg-brand-purple/5 blur-3xl rounded-full -mr-16 -mt-16 pointer-events-none"></div>

                {error && (
                  <motion.div
                    initial={{ opacity: 0, y: -10 }}
                    animate={{ opacity: 1, y: 0 }}
                    className="p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-xs font-bold uppercase tracking-wider flex items-center gap-3"
                  >
                    <CustomIcon name="alert-triangle" size={16} />
                    {error}
                  </motion.div>
                )}

                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                  <div>
                    <label className="block text-[10px] uppercase tracking-widest text-brand-gray font-bold mb-3">Collector Name</label>
                    <input
                      required
                      type="text"
                      value={formData.name}
                      onChange={(e) => setFormData({ ...formData, name: e.target.value })}
                      placeholder="Your Name"
                      className="w-full bg-white/[0.03] border border-white/10 rounded-xl px-5 py-4 text-white placeholder:text-white/10 focus:outline-none focus:border-brand-purple/40 transition-all"
                    />
                  </div>
                  <div>
                    <label className="block text-[10px] uppercase tracking-widest text-brand-gray font-bold mb-3">Contact Coordinate (Email)</label>
                    <input
                      required
                      type="email"
                      value={formData.email}
                      onChange={(e) => setFormData({ ...formData, email: e.target.value })}
                      placeholder="email@studio.com"
                      className="w-full bg-white/[0.03] border border-white/10 rounded-xl px-5 py-4 text-white placeholder:text-white/10 focus:outline-none focus:border-brand-purple/40 transition-all"
                    />
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                  <div>
                    <label className="block text-[10px] uppercase tracking-widest text-brand-gray font-bold mb-3">Architectural Material</label>
                    <select
                      required
                      value={selectedMaterial}
                      onChange={(e) => setSelectedMaterial(e.target.value)}
                      className="w-full bg-white/[0.03] border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-brand-purple/40 transition-all appearance-none cursor-pointer"
                    >
                      <option value="" disabled className="bg-[#0A0A0A]">Select Material</option>
                      {materials.map((m) => (
                        <option key={m.id} value={m.id} className="bg-[#0A0A0A]">{m.name}</option>
                      ))}
                    </select>
                  </div>
                  <div>
                    <label className="block text-[10px] uppercase tracking-widest text-brand-gray font-bold mb-3">Studio Palette (Colour)</label>
                    <div className="relative">
                      <select
                        required
                        disabled={!selectedMaterial || fetchingColors}
                        value={selectedColor}
                        onChange={(e) => setSelectedColor(e.target.value)}
                        className={`w-full bg-white/[0.03] border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-brand-purple/40 transition-all appearance-none cursor-pointer disabled:opacity-30 disabled:cursor-not-allowed`}
                      >
                        <option value="" disabled className="bg-[#0A0A0A]">
                          {fetchingColors ? "Syncing Palette..." : (selectedMaterial ? "Select Colour" : "First Select Material")}
                        </option>
                        {colors.map((color) => (
                          <option key={color.id} value={color.id} className="bg-[#0A0A0A]">
                            {color.name}
                          </option>
                        ))}
                      </select>
                      {fetchingColors && (
                        <div className="absolute right-4 top-1/2 -translate-y-1/2">
                          <div className="w-3 h-3 border-2 border-brand-purple/20 border-t-brand-purple rounded-full animate-spin"></div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>

                <div>
                  <label className="block text-[10px] uppercase tracking-widest text-brand-gray font-bold mb-3">Project Constraints & Description</label>
                  <textarea
                    required
                    rows={4}
                    value={formData.description}
                    onChange={(e) => setFormData({ ...formData, description: e.target.value })}
                    placeholder="Briefly describe the intent of this object..."
                    className="w-full bg-white/[0.03] border border-white/10 rounded-xl px-5 py-4 text-white placeholder:text-white/10 focus:outline-none focus:border-brand-purple/40 transition-all resize-none"
                  ></textarea>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-2">
                  <div className="p-4 rounded-xl bg-white/[0.02] border border-white/5 text-center">
                    <p className="text-[9px] uppercase tracking-widest text-brand-gray/60 mb-1">Formats</p>
                    <p className="text-[10px] uppercase font-bold text-white">STL, OBJ, 3MF, ZIP</p>
                  </div>
                  <div className="p-4 rounded-xl bg-white/[0.02] border border-white/5 text-center">
                    <p className="text-[9px] uppercase tracking-widest text-brand-gray/60 mb-1">Max Capacity</p>
                    <p className="text-[10px] uppercase font-bold text-white">20 MB</p>
                  </div>
                  <div className="p-4 rounded-xl bg-white/[0.02] border border-white/5 text-center">
                    <p className="text-[9px] uppercase tracking-widest text-brand-gray/60 mb-1">Review Window</p>
                    <p className="text-[10px] uppercase font-bold text-brand-purple">24-48 Hours</p>
                  </div>
                </div>

                <div>
                  <label className="block text-[10px] uppercase tracking-widest text-brand-gray font-bold mb-3">Geometry Upload</label>
                  <label className={`
                    relative w-full border-2 border-dashed rounded-2xl p-10 flex flex-col items-center justify-center cursor-pointer transition-all gap-4
                    ${file ? 'border-brand-purple/40 bg-brand-purple/5' : 'border-white/10 bg-white/[0.02] hover:bg-white/[0.05] hover:border-white/20'}
                  `}>
                    <input
                      type="file"
                      onChange={handleFileChange}
                      className="hidden"
                      accept=".stl,.obj,.3mf,.zip"
                    />
                    <div className={`w-12 h-12 rounded-full flex items-center justify-center border transition-all ${file ? 'bg-brand-purple text-black border-brand-purple' : 'bg-white/5 text-brand-gray border-white/10'}`}>
                      <CustomIcon name={file ? "check" : "upload-cloud"} size={20} />
                    </div>
                    <div className="text-center">
                      <p className="text-xs font-bold uppercase tracking-wider text-white mb-1">{file ? file.name : "Select Geometry File"}</p>
                      <p className="text-[10px] uppercase tracking-widest text-brand-gray/60">{file ? `${(file.size / 1024 / 1024).toFixed(2)} MB` : "Analyze & Upload Surface"}</p>
                    </div>
                  </label>
                </div>

                <div className="space-y-4">
                  <div className="flex items-start gap-3 cursor-pointer group" onClick={() => setConfirmRights(!confirmRights)}>
                    <div className={`w-5 h-5 rounded border flex items-center justify-center transition-all ${confirmRights ? 'bg-brand-purple border-brand-purple shadow-[0_0_10px_rgba(155,135,245,0.4)]' : 'border-white/20 group-hover:border-white/40'}`}>
                      {confirmRights && <CustomIcon name="check" size={12} className="text-black" />}
                    </div>
                    <span className="text-[10px] text-brand-gray/80 leading-relaxed font-bold uppercase tracking-wider">I confirm I have the legal rights to print this digital geometry.</span>
                  </div>
                  <div className="flex items-start gap-3 cursor-pointer group" onClick={() => setConfirmNoIllegal(!confirmNoIllegal)}>
                    <div className={`w-5 h-5 rounded border flex items-center justify-center transition-all ${confirmNoIllegal ? 'bg-brand-purple border-brand-purple shadow-[0_0_10px_rgba(155,135,245,0.4)]' : 'border-white/20 group-hover:border-white/40'}`}>
                      {confirmNoIllegal && <CustomIcon name="check" size={12} className="text-black" />}
                    </div>
                    <span className="text-[10px] text-brand-gray/80 leading-relaxed font-bold uppercase tracking-wider">I confirm this geometry does not violate copyright or contain illegal content.</span>
                  </div>
                </div>

                <div className="pt-6 border-t border-white/10">
                  <div className="mb-6 flex items-center gap-3 p-4 rounded-xl bg-white/[0.02] border border-white/5">
                    <CustomIcon name="info" size={14} className="text-brand-purple shrink-0" />
                    <p className="text-[10px] text-brand-gray/60 leading-normal uppercase tracking-widest">Pricing Strategy: Our studio reviews every surface. A definitive quote will be provided after structural analysis.</p>
                  </div>
                  <button
                    type="submit"
                    disabled={loading}
                    className="btn-primary w-full py-5 rounded-2xl font-bold text-xs uppercase tracking-[0.3em] flex items-center justify-center gap-4 group disabled:opacity-50"
                  >
                    {loading ? (
                      <>
                        <div className="w-4 h-4 border-2 border-black/20 border-t-black rounded-full animate-spin"></div>
                        Transmitting Geometry...
                      </>
                    ) : (
                      <>
                        Initialize Protocol
                        <CustomIcon name="send" size={14} className="group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform" />
                      </>
                    )}
                  </button>
                  <p className="text-[9px] text-center text-brand-gray/30 mt-6 uppercase tracking-[0.2em]">All requests are reviewed within 48 studio hours.</p>
                </div>
              </form>
            </Reveal>
          </div>
        </div>
      );
    };

    const NavBar = ({ items, currentView, setView, className }) => {
      const [isMobile, setIsMobile] = useState(false);

      useEffect(() => {
        const handleResize = () => setIsMobile(window.innerWidth < 1024);
        handleResize();
        window.addEventListener("resize", handleResize);
        return () => window.removeEventListener("resize", handleResize);
      }, []);

      const transition = { type: "spring", bounce: 0, duration: 0.5 };

      return (
        <div className={`relative z-[100] w-fit pointer-events-auto ${className || ''}`}>
          <div className="flex items-center gap-2 bg-black/70 border border-white/15 backdrop-blur-3xl py-1.5 px-1.5 rounded-full shadow-[0_0_40px_rgba(0,0,0,0.5)]">
            {items.map((item) => {
              const isActive = currentView === item.id;

              return (
                <motion.button
                  key={item.id}
                  onClick={() => setView(item.id)}
                  initial={false}
                  animate={{
                    gap: isMobile ? (isActive ? "0.5rem" : "0") : "0.75rem",
                    paddingLeft: isMobile ? (isActive ? "1rem" : "0.75rem") : "1.25rem",
                    paddingRight: isMobile ? (isActive ? "1rem" : "0.75rem") : "1.25rem",
                  }}
                  transition={transition}
                  className={`
                    relative flex items-center rounded-full py-2.5 text-[10px] font-bold uppercase tracking-[0.2em] transition-colors duration-300
                    ${isActive ? 'text-white' : 'text-brand-gray/60 hover:text-white hover:bg-white/5'}
                  `}
                >
                  <CustomIcon name={item.icon} size={16} />

                  <AnimatePresence mode="wait" initial={false}>
                    {(!isMobile || isActive) && (
                      <motion.span
                        key="label"
                        initial={{ width: 0, opacity: 0 }}
                        animate={{ width: "auto", opacity: 1 }}
                        exit={{ width: 0, opacity: 0 }}
                        transition={transition}
                        className="overflow-hidden whitespace-nowrap"
                      >
                        {item.name}
                      </motion.span>
                    )}
                  </AnimatePresence>

                  {isActive && (
                    <motion.div
                      layoutId="navbar-anchor-lamp"
                      className="absolute inset-0 w-full bg-brand-purple/15 rounded-full -z-10"
                      initial={false}
                      transition={transition}
                    >
                      <div className="absolute -bottom-1.5 left-1/2 -translate-x-1/2 w-6 h-[2px] bg-brand-purple rounded-t-full shadow-[0_-4px_12px_rgba(155,135,245,0.8)]">
                        <div className="absolute w-12 h-8 bg-brand-purple/20 rounded-full blur-xl -top-4 -left-3" />
                        <div className="absolute w-8 h-6 bg-brand-purple/10 rounded-full blur-lg -top-2" />
                      </div>
                    </motion.div>
                  )}
                </motion.button>
              );
            })}
          </div>
        </div>
      );
    };

    const Navbar = ({ setView, currentView, cartCount, onOpenCart }) => {
      const [isPopping, setIsPopping] = useState(false);
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      useEffect(() => {
        if (cartCount > 0) {
          setIsPopping(true);
          const timer = setTimeout(() => setIsPopping(false), 3000);
          return () => clearTimeout(timer);
        }
      }, [cartCount]);

      // Close menu on ESC
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === "Escape") setIsMenuOpen(false);
        };
        window.addEventListener("keydown", handleKeyDown);
        return () => window.removeEventListener("keydown", handleKeyDown);
      }, []);

      const navItems = [
        { name: 'Home', id: 'home', icon: 'home' },
        { name: 'Prints', id: 'prints', icon: 'package' },
        { name: 'Custom', id: 'custom', icon: 'edit-3' },
        { name: 'About', id: 'about', icon: 'user' }
      ];

      const handleNavClick = (id) => {
        setView(id);
        setIsMenuOpen(false);
      };

      return (
        <header className="fixed top-0 left-0 w-full z-50 pointer-events-none">
          <div className="container-fluid mx-auto flex items-center px-4 py-8 md:px-8 lg:px-10">
            {/* Left Column: Branding */}
            <div className="flex-1 flex justify-start items-center pointer-events-auto transition-transform active:scale-95">
              <button
                onClick={() => handleNavClick('home')}
                className="text-lg md:text-xl font-bold tracking-[0.4em] uppercase text-white/90 hover:text-brand-purple transition-all whitespace-nowrap bg-black/30 backdrop-blur-md border border-white/10 px-6 py-2.5 rounded-full shadow-[0_0_20px_rgba(155,135,245,0.1)] hover:shadow-[0_0_30px_rgba(155,135,245,0.2)] hover:border-brand-purple/30 group"
              >
                L A Y E R D
              </button>
            </div>

            {/* Center Column: Desktop Navigation (Horizontal Tubelight) */}
            <div className="hidden lg:flex flex-none pointer-events-auto">
              <NavBar items={navItems} currentView={currentView} setView={setView} />
            </div>

            {/* Right Column: Utility (Cart + Mobile Toggle) */}
            <div className="flex-1 flex justify-end items-center gap-4 pointer-events-auto">
              <button
                onClick={onOpenCart}
                className={`
                  relative w-10 h-10 md:w-12 md:h-12 flex items-center justify-center rounded-full transition-all duration-300
                  bg-black/70 border border-white/20 backdrop-blur-2xl shadow-[0_4px_20px_rgba(0,0,0,0.4)] hover:shadow-[0_0_30px_rgba(155,135,245,0.4)]
                  text-white hover:border-brand-purple/40 scale-90 md:scale-100 shrink-0
                  ${isPopping ? 'animate-cart-pop text-brand-purple border-brand-purple/40 shadow-[0_0_40px_rgba(155,135,245,0.6)]' : ''}
                `}
              >
                <CustomIcon name="shopping-cart" size={16} />
                {cartCount > 0 && (
                  <span className="absolute -top-1 -right-1 bg-brand-purple text-black text-[8px] md:text-[9px] font-bold w-4 h-4 md:w-5 md:h-5 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(155,135,245,1)]">
                    {cartCount}
                  </span>
                )}
              </button>

              {/* Hamburger Toggle (Mobile/Tablet Only) */}
              <button
                onClick={() => setIsMenuOpen(true)}
                className="lg:hidden w-10 h-10 md:w-12 md:h-12 flex items-center justify-center rounded-full bg-black/70 border border-white/20 backdrop-blur-2xl text-white hover:border-brand-purple/40 transition-all"
              >
                <CustomIcon name="menu" size={20} />
              </button>
            </div>
          </div>

          {/* Mobile Sidebar Navigation */}
          <AnimatePresence>
            {isMenuOpen && (
              <>
                {/* Backdrop Overlay */}
                <motion.div
                  initial={{ opacity: 0 }}
                  animate={{ opacity: 1 }}
                  exit={{ opacity: 0 }}
                  onClick={() => setIsMenuOpen(false)}
                  className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm lg:hidden pointer-events-auto"
                />

                {/* Sidebar Drawer */}
                <motion.div
                  initial={{ x: "100%" }}
                  animate={{ x: 0 }}
                  exit={{ x: "100%" }}
                  transition={{ type: "spring", damping: 30, stiffness: 300, mass: 0.8 }}
                  className="fixed top-0 right-0 z-[110] w-[80%] max-w-sm h-full bg-[#050505] border-l border-white/10 backdrop-blur-[100px] shadow-2xl lg:hidden pointer-events-auto flex flex-col"
                >
                  {/* Close Header */}
                  <div className="p-8 flex justify-between items-center border-b border-white/5">
                    <span className="text-xs font-bold tracking-widest uppercase text-white/50">L A Y E R D</span>
                    <button
                      onClick={() => setIsMenuOpen(false)}
                      className="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 border border-white/10 text-white transition-all"
                    >
                      <CustomIcon name="x" size={20} />
                    </button>
                  </div>

                  {/* Vertical Menu Links */}
                  <nav className="flex-grow flex flex-col p-8 gap-4 overflow-y-auto">
                    {navItems.map((item, i) => (
                      <motion.button
                        key={item.id}
                        initial={{ opacity: 0, x: 20 }}
                        animate={{ opacity: 1, x: 0 }}
                        transition={{ delay: 0.1 + i * 0.05 }}
                        onClick={() => handleNavClick(item.id)}
                        className={`
                          flex items-center gap-6 p-6 rounded-2xl transition-all duration-300 group
                          ${currentView === item.id ? 'bg-brand-purple/10 border border-brand-purple/30 text-white' : 'hover:bg-white/5 border border-transparent text-brand-gray/60 hover:text-white'}
                        `}
                      >
                        <CustomIcon
                          name={item.icon}
                          className={currentView === item.id ? 'text-brand-purple' : 'group-hover:text-brand-purple'}
                        />
                        <span className="text-sm font-bold uppercase tracking-[0.3em]">{item.name}</span>
                        {currentView === item.id && (
                          <div className="ml-auto w-1.5 h-1.5 rounded-full bg-brand-purple shadow-[0_0_10px_rgba(155,135,245,1)]" />
                        )}
                      </motion.button>
                    ))}
                  </nav>

                  {/* Sidebar Footer */}
                  <div className="p-8 border-t border-white/5 bg-white/[0.02]">
                    <div className="flex flex-col gap-4">
                      <p className="text-[10px] text-brand-gray/40 uppercase tracking-widest font-bold">Limited Studio Access</p>
                      <button
                        onClick={() => { handleNavClick('custom'); setIsMenuOpen(false); }}
                        className="btn-primary w-full py-4 rounded-xl font-bold text-[10px] uppercase tracking-widest"
                      >
                        Custom Request
                      </button>
                    </div>
                  </div>
                </motion.div>
              </>
            )}
          </AnimatePresence>
        </header>
      );
    };

    const App = () => {
      const toast = useToast();
      const [view, setView] = useState('home');
      const [user, setUser] = useState(null);
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [stockMap, setStockMap] = useState({});

      // CART PERSISTENCE: Load cart from localStorage on mount
      const [cart, setCart] = useState(() => {
        try {
          const savedCart = localStorage.getItem('layerd_cart');
          if (!savedCart) return [];
          const parsed = JSON.parse(savedCart);
          return Array.isArray(parsed) ? parsed : [];
        } catch {
          return [];
        }
      });
      const [isCartOpen, setIsCartOpen] = useState(false);
      const [isCheckoutOpen, setIsCheckoutOpen] = useState(false);
      const [preorderProduct, setPreorderProduct] = useState(null);
      const [isPreorderOpen, setIsPreorderOpen] = useState(false);

      // Open preorder modal with product
      const handlePreorder = (product) => {
        setPreorderProduct(product);
        setIsPreorderOpen(true);
      };

      // CART PERSISTENCE: Save cart to localStorage whenever it changes
      useEffect(() => {
        try {
          localStorage.setItem('layerd_cart', JSON.stringify(cart));
        } catch (e) {
          console.warn('Failed to persist cart:', e);
        }
      }, [cart]);

      useEffect(() => {
        if (!supabase.auth) return;

        supabase.auth.getSession().then((result) => {
          const session = result?.data?.session ?? null;
          setUser(session?.user ?? null);
        }).catch((err) => {
          console.warn('Failed to get session:', err);
        });

        const authResult = supabase.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null);
        });
        const subscription = authResult?.data?.subscription;

        return () => { if (subscription) subscription.unsubscribe(); };
      }, []);

      // Fetch stock data on mount
      useEffect(() => {
        const fetchStock = async () => {
          const { data } = await supabase
            .from("product_stock")
            .select("product_name, stock");

          if (data) {
            const map = {};
            data.forEach((item) => {
              map[item.product_name] = item.stock;
            });
            setStockMap(map);
          }
        };
        fetchStock();
      }, []);

      const navOrder = ['home', 'prints', 'custom', 'about'];
const handleSetView = (newView) => {
  const currentIndex = navOrder.indexOf(view);
  const newIndex = navOrder.indexOf(newView);
  if (currentIndex !== -1 && newIndex !== -1) {
    if (newIndex > currentIndex) {
      shapeImpulse.x = 0.07; // moving right → shapes drift right
    } else if (newIndex < currentIndex) {
      shapeImpulse.x = -0.07; // moving left → shapes drift left
    }
  }
  shapeImpulse.y = -0.04; // slight upward spin on any page change
  setView(newView);
};

      useEffect(() => {
        const handleEsc = (e) => {
          if (e.key === 'Escape') {
            setSelectedProduct(null);
            setIsCartOpen(false);
            setIsPreorderOpen(false);
          }
        };
        window.addEventListener('keydown', handleEsc);
        return () => window.removeEventListener('keydown', handleEsc);
      }, []);


      const addToCart = (product) => {
        const availableStock = stockMap[product.name];
        
        // If stock is defined and is 0, cannot add
        if (availableStock !== undefined && availableStock <= 0) {
          toast.warning("This item is out of stock");
          return;
        }
        
        setCart(prev => {
          const existing = prev.find(item => item.id === product.id);
          if (existing) {
            // Check if already at max stock
            if (availableStock !== undefined && existing.qty >= availableStock) {
              toast.warning("Maximum available stock reached");
              return prev;
            }
            return prev.map(item => item.id === product.id ? { ...item, qty: item.qty + 1 } : item);
          }
          // New item - start with qty 1
          return [...prev, { ...product, qty: 1 }];
        });
      };

      const updateQty = (id, qty) => {
        const item = cart.find(i => i.id === id);
        if (item) {
          const availableStock = stockMap[item.name];
          // Prevent exceeding stock
          if (availableStock !== undefined && qty > availableStock) {
            toast.warning("Maximum available stock reached");
            return;
          }
          if (qty < 1) qty = 1;
        }
        setCart(prev => prev.map(item => item.id === id ? { ...item, qty } : item));
      };

      const removeFromCart = (id) => {
        setCart(prev => prev.filter(item => item.id !== id));
      };

      const cartCount = cart.reduce((sum, item) => sum + item.qty, 0);
      const totalPrice = cart.reduce((sum, item) => {
        const price = typeof item.price === 'string' ? parseFloat(item.price.replace(/[^\d.]/g, '')) : parseFloat(item.price) || 0;
        return sum + (price * item.qty);
      }, 0);

      const renderView = () => {
        return (
          <AnimatePresence
            mode="wait"
            onExitComplete={() => {
              window.scrollTo({ top: 0, behavior: 'auto' });
            }}
          >
            <motion.div
              key={view}
              initial={{ opacity: 0, y: 10 }}
              animate={{ opacity: 1, y: 0 }}
              exit={{ opacity: 0, y: -10 }}
              transition={{ duration: 0.4, ease: [0.23, 1, 0.32, 1] }}
            >
              {view === 'home' && (
                <>
                  <Hero />
                  <ProductSection onSelectProduct={setSelectedProduct} onPreorder={handlePreorder} limit={4} title="Featured" stockMap={stockMap} />
                  <Values />
                  <ContactSection />
                </>
              )}
              {view === 'prints' && <ProductSection onSelectProduct={setSelectedProduct} onPreorder={handlePreorder} title="Catalog" stockMap={stockMap} />}
              {view === 'about' && <AboutUs />}
              {view === 'custom' && <CustomPrintView setView={handleSetView} />}
              {view === 'privacy' && <PrivacyPolicyView />}
              {view === 'tos' && <TermsOfServiceView />}
              {view === 'refund' && <RefundPolicyView />}
              {view === 'shipping' && <ShippingPolicyView />}
              {/* Fallback for safety */}
              {!['home', 'prints', 'about', 'custom', 'privacy', 'tos', 'refund', 'shipping'].includes(view) && (
                <div className="container mx-auto px-6 py-48 text-center min-h-[60vh] flex flex-col items-center justify-center">
                  <h1 className="text-8xl font-bold text-white/5 mb-8">404</h1>
                  <h2 className="text-2xl font-bold mb-4">Route Not Found</h2>
                  <p className="text-brand-gray/60 mb-12">The requested geometry does not exist in our system.</p>
                  <button onClick={() => setView('home')} className="btn-primary px-12 py-4 rounded-xl font-bold uppercase tracking-widest text-xs">Return Home</button>
                </div>
              )} 
            </motion.div>
          </AnimatePresence>
        );
      };

      return (
        <motion.div
          variants={containerVariants}
          initial="hidden"
          animate="visible"
          className="min-h-screen flex flex-col selection:bg-brand-purple selection:text-brand-black overflow-x-hidden"
        >
          <ShaderBackground isBlurred={view !== 'home'} />

          <motion.div variants={navVariants}>
            <Navbar
              setView={handleSetView}
              currentView={view}
              cartCount={cartCount}
              onOpenCart={() => setIsCartOpen(true)}
            />
          </motion.div>

          <motion.main variants={fadeUpVariants} className="flex-grow">
            {renderView()}
          </motion.main>

          <motion.div variants={fadeUpVariants}>
            <Footer onNavigate={handleSetView} />
          </motion.div>

          {selectedProduct && (
            <ProductModal
              product={selectedProduct}
              onClose={() => setSelectedProduct(null)}
              onAddToCart={addToCart}
              stockMap={stockMap}
              onPreorder={handlePreorder}
            />
          )}

          <CartSidebar
            isOpen={isCartOpen}
            onClose={() => setIsCartOpen(false)}
            items={cart}
            total={totalPrice}
            onUpdateQty={updateQty}
            onRemove={removeFromCart}
            stockMap={stockMap}
            onCheckout={() => {
              setIsCartOpen(false);
              setIsCheckoutOpen(true);
            }}
          />

          <CheckoutModal
            isOpen={isCheckoutOpen}
            onClose={() => setIsCheckoutOpen(false)}
            cart={cart}
            total={totalPrice}
            onSuccess={() => setCart([])}
          />

          <PreorderModal
            product={preorderProduct}
            isOpen={isPreorderOpen}
            onClose={() => {
              setIsPreorderOpen(false);
              setPreorderProduct(null);
            }}
            toast={toast}
          />
        </motion.div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ToastProvider><App /></ToastProvider>);

    // ChromaGrid Vanilla JS Implementation
    (function () {
      let spotlightCleanup = null;

      const initSpotlight = () => {
        const spotlight = document.getElementById('studio-spotlight');
        if (!spotlight) return;

        // Debounced mousemove handler for performance
        let ticking = false;
        const handleMousemove = (e) => {
          if (!ticking) {
            window.requestAnimationFrame(() => {
              const { clientX, clientY } = e;

              // Smooth follow for global spotlight
              if (window.gsap) {
                gsap.to(spotlight, {
                  x: clientX,
                  y: clientY,
                  duration: 0.6,
                  ease: 'power3.out',
                  opacity: 1
                });
              }

              // Update card spotlight effects
              const cards = document.querySelectorAll('.chroma-card');
              cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = ((clientX - rect.left) / rect.width) * 100;
                const y = ((clientY - rect.top) / rect.height) * 100;
                card.style.setProperty('--mouse-x', `${x}%`);
                card.style.setProperty('--mouse-y', `${y}%`);

                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const distance = Math.sqrt(Math.pow(clientX - centerX, 2) + Math.pow(clientY - centerY, 2));

                if (distance < 450) {
                  card.classList.add('in-spotlight');
                } else {
                  card.classList.remove('in-spotlight');
                }
              });

              ticking = false;
            });
            ticking = true;
          }
        };

        window.addEventListener('mousemove', handleMousemove);

        const handleMouseleave = () => {
          if (window.gsap) {
            gsap.to(spotlight, { opacity: 0, duration: 1 });
          }
        };
        window.addEventListener('mouseleave', handleMouseleave);

        // Cleanup function to prevent memory leaks
        spotlightCleanup = () => {
          window.removeEventListener('mousemove', handleMousemove);
          window.removeEventListener('mouseleave', handleMouseleave);
        };
      };

      let attempts = 0;
      const maxAttempts = 100;
      const checkResources = setInterval(() => {
        attempts++;
        if (attempts >= maxAttempts) {
          clearInterval(checkResources);
          console.warn('Spotlight init timed out: GSAP or spotlight element not available');
          return;
        }
        if (window.gsap && document.getElementById('studio-spotlight')) {
          clearInterval(checkResources);
          initSpotlight();
        }
      }, 100);
    })();
  </script>
</body>
